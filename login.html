<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<link rel="stylesheet" href="stylesheet.css">
<body>
    <div class="login">
        <h2>
            Login
        </h2>
        <form class="form" action="homepage.html" method="post">
            <div style="display:flex; flex-direction: column; gap: 10px;">
                <div style="display: flex; flex-direction: column; max-width: fit-content;">
                    <label for "name">Email</label>
                    <input type="email" name="name" required>
                </div>
                <div style="display: flex; flex-direction: column; max-width: fit-content;" >
                    <label for "password">Password</label>
                    <input type="text" name="password" required>
                </div>
            </div>
            
            <div>
                <input class="btn"type="submit" value="Let's Go!!">
            </div>
        </form>
        <h3>
            <a href="signup.html">Request membership</a>
        </h3>
    </div>
    <img src="images/millions slices.png">

</body>
</html>
